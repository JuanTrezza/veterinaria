<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clínica Veterinaria — Iniciar sesión</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="imagenes/logoMascota.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
      background: linear-gradient(155deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
    }
    .login-box {
      background: var(--color-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }
    .login-tabs {
      display: flex;
      border-bottom: 2px solid var(--color-border);
    }
    .login-tab {
      flex: 1;
      padding: 18px 24px;
      border: none;
      background: none;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: color var(--transition), border-bottom var(--transition);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }
    .login-tab.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-accent);
    }
    .login-panel { padding: 36px 40px 40px; }
    .login-panel.hidden { display: none; }
    .login-panel h2 { margin-bottom: 24px; }

    @media (max-width: 480px) {
      .login-panel { padding: 28px 20px 32px; }
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="login-wrapper">
    <div class="login-box">
      <div class="login-tabs">
        <button class="login-tab active" id="tabLogin"><i class="fa fa-sign-in-alt" style="margin-right:6px"></i>Iniciar sesión</button>
        <button class="login-tab" id="tabRegistro"><i class="fa fa-user-plus" style="margin-right:6px"></i>Registrarme</button>
      </div>

      <!-- Panel Login -->
      <div class="login-panel" id="panelLogin">
        <h2>Bienvenido de nuevo</h2>
        <form id="formLogin" novalidate>
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <div class="input-wrapper">
              <i class="fa fa-envelope input-icon"></i>
              <input class="form-control" type="email" id="loginEmail" placeholder="usuario@mail.com" required>
            </div>
          </div>
          <div class="form-group">
            <label for="loginPass">Contraseña</label>
            <div class="input-wrapper">
              <i class="fa fa-lock input-icon"></i>
              <input class="form-control" type="password" id="loginPass" placeholder="Tu contraseña" required style="padding-right:44px">
              <button type="button" class="toggle-pass" data-target="loginPass"><i class="fa fa-eye"></i></button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full">
            <span class="spinner"></span>
            <span class="btn-text">Ingresar</span>
          </button>
        </form>
        <div id="loginMsg" style="margin-top:14px"></div>
      </div>

      <!-- Panel Registro -->
      <div class="login-panel hidden" id="panelRegistro">
        <h2>Crear cuenta</h2>
        <form id="formRegistro" novalidate>
          <div class="form-group">
            <label for="regEmail">Email</label>
            <div class="input-wrapper">
              <i class="fa fa-envelope input-icon"></i>
              <input class="form-control" type="email" id="regEmail" placeholder="usuario@mail.com" required>
            </div>
          </div>
          <div class="form-group">
            <label for="regPass">Contraseña</label>
            <div class="input-wrapper">
              <i class="fa fa-lock input-icon"></i>
              <input class="form-control" type="password" id="regPass" placeholder="Mínimo 6 caracteres" required style="padding-right:44px">
              <button type="button" class="toggle-pass" data-target="regPass"><i class="fa fa-eye"></i></button>
            </div>
          </div>
          <div class="form-group">
            <label for="regConfirm">Confirmar contraseña</label>
            <div class="input-wrapper">
              <i class="fa fa-lock input-icon"></i>
              <input class="form-control" type="password" id="regConfirm" placeholder="Repetí tu contraseña" required style="padding-right:44px">
              <button type="button" class="toggle-pass" data-target="regConfirm"><i class="fa fa-eye"></i></button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full">
            <span class="spinner"></span>
            <span class="btn-text">Crear cuenta</span>
          </button>
        </form>
        <div id="registroMsg" style="margin-top:14px"></div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <script src="js/auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
