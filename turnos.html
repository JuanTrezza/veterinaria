<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clínica Veterinaria — Turnos Disponibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="imagenes/logoMascota.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .dia-seccion { margin-bottom: 48px; }
    .dia-titulo {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--color-primary);
      padding: 10px 18px;
      background: var(--color-bg-alt);
      border-radius: var(--radius-md);
      margin-bottom: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .turnos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }
    .turno-card {
      background: var(--color-white);
      border-radius: var(--radius-md);
      padding: 18px 16px;
      text-align: center;
      box-shadow: var(--shadow-sm);
      border: 2px solid transparent;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .turno-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .turno-disponible { border-color: var(--color-accent); }
    .turno-ocupado    { background: var(--color-bg-alt); opacity: .65; }
    .turno-mine       { border-color: var(--color-success); background: #F0FDF4; }
    .turno-hora {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="page-header">
    <h1>📅 Turnos Disponibles</h1>
    <p>Seleccioná un turno y agendalo para tu mascota fácilmente.</p>
  </div>

  <section>
    <div class="container">
      <div id="msgTurnos"></div>
      <div id="contenedorTurnos">
        <div class="page-loader"><div class="spinner-circle"></div></div>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="js/auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
