<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clínica Veterinaria — Mis Turnos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="imagenes/logoMascota.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .mi-turno-card {
      background: var(--color-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 24px 28px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      transition: transform var(--transition), box-shadow var(--transition);
      margin-bottom: 16px;
    }
    .mi-turno-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .mi-turno-fecha { font-size: 1.05rem; font-weight: 700; color: var(--color-primary); margin-bottom: 8px; }
    .mi-turno-mascota { font-size: .95rem; color: var(--color-text-muted); }
    .mi-turno-estado { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

    @media (max-width: 600px) {
      .mi-turno-card { flex-direction: column; }
      .mi-turno-estado { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="page-header">
    <h1>🗓️ Mis Turnos</h1>
    <p>Consultá los turnos que ya agendaste y su estado actual.</p>
  </div>

  <section>
    <div class="container" style="max-width:800px">
      <div id="contenedorMisTurnos">
        <div class="page-loader"><div class="spinner-circle"></div></div>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="js/auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
