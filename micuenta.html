<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clínica Veterinaria — Mi Cuenta</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="imagenes/logoMascota.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .cuenta-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }
    .stats-cuenta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 20px;
    }
    .stat-cuenta {
      background: var(--color-bg-alt);
      border-radius: var(--radius-md);
      padding: 20px;
      text-align: center;
    }
    .stat-cuenta .num {
      font-family: var(--font-heading);
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--color-accent);
      display: block;
    }
    .stat-cuenta .lbl { font-size: .9rem; color: var(--color-text-muted); }

    .perfil-avatar {
      width: 80px; height: 80px;
      background: var(--color-bg-alt);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin-bottom: 16px;
      border: 3px solid var(--color-accent);
    }
    .perfil-email { font-size: 1.1rem; font-weight: 700; color: var(--color-primary); margin-bottom: 6px; }
    .perfil-fecha { color: var(--color-text-muted); font-size: .95rem; }

    @media (max-width: 768px) {
      .cuenta-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="page-header">
    <h1>👤 Mi Cuenta</h1>
    <p>Información de tu perfil y configuración de cuenta.</p>
  </div>

  <section>
    <div class="container" style="max-width:900px">
      <div class="cuenta-layout">

        <!-- Perfil -->
        <div class="card fade-in">
          <div class="card-body">
            <div class="perfil-avatar">👤</div>
            <div class="perfil-email" id="cuentaEmail">—</div>
            <div class="perfil-fecha">Registrado el: <strong id="cuentaFecha">—</strong></div>

            <div class="stats-cuenta">
              <div class="stat-cuenta">
                <span class="num" id="cuentaMascotas">0</span>
                <span class="lbl">Mascotas</span>
              </div>
              <div class="stat-cuenta">
                <span class="num" id="cuentaTurnos">0</span>
                <span class="lbl">Turnos</span>
              </div>
            </div>

            <button class="btn btn-danger-custom btn-full" id="btnCerrarSesion" style="margin-top:24px">
              <i class="fa fa-sign-out-alt"></i> Cerrar sesión
            </button>
          </div>
        </div>

        <!-- Cambiar contraseña -->
        <div class="card fade-in">
          <div class="card-body">
            <h3 style="margin-bottom:24px"><i class="fa fa-key" style="color:var(--color-accent);margin-right:8px"></i>Cambiar contraseña</h3>
            <form id="formCambiarPass" novalidate>
              <div class="form-group">
                <label for="passActual">Contraseña actual</label>
                <div class="input-wrapper">
                  <i class="fa fa-lock input-icon"></i>
                  <input class="form-control" type="password" id="passActual" placeholder="Tu contraseña actual" required style="padding-right:44px">
                  <button type="button" class="toggle-pass" data-target="passActual"><i class="fa fa-eye"></i></button>
                </div>
              </div>
              <div class="form-group">
                <label for="passNueva">Nueva contraseña</label>
                <div class="input-wrapper">
                  <i class="fa fa-lock input-icon"></i>
                  <input class="form-control" type="password" id="passNueva" placeholder="Mínimo 6 caracteres" required style="padding-right:44px">
                  <button type="button" class="toggle-pass" data-target="passNueva"><i class="fa fa-eye"></i></button>
                </div>
              </div>
              <div class="form-group">
                <label for="passConfirmar">Confirmar nueva contraseña</label>
                <div class="input-wrapper">
                  <i class="fa fa-lock input-icon"></i>
                  <input class="form-control" type="password" id="passConfirmar" placeholder="Repetí la nueva contraseña" required style="padding-right:44px">
                  <button type="button" class="toggle-pass" data-target="passConfirmar"><i class="fa fa-eye"></i></button>
                </div>
              </div>
              <button type="submit" class="btn btn-primary btn-full">
                <i class="fa fa-save"></i> Actualizar contraseña
              </button>
            </form>
            <div id="cambiarPassMsg" style="margin-top:14px"></div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="js/auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
