<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clínica Veterinaria — Mis Mascotas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="imagenes/logoMascota.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .mascotas-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 40px;
      align-items: start;
    }
    .form-mascota-card { position: sticky; top: 88px; }
    .form-mascota-card .card-body { padding: 32px; }
    .form-mascota-card h3 { margin-bottom: 24px; }

    .preview-foto {
      display: none;
      width: 100%;
      max-height: 160px;
      object-fit: cover;
      border-radius: var(--radius-md);
      margin-top: 10px;
    }

    .mascotas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 24px;
    }
    .col-mascota { display: flex; }
    .mascota-card {
      display: flex;
      flex-direction: column;
      background: var(--color-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      width: 100%;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .mascota-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
    .mascota-foto {
      height: 180px;
      background: var(--color-bg-alt);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .mascota-foto img { width: 100%; height: 100%; object-fit: cover; }
    .mascota-avatar { font-size: 4rem; }
    .mascota-info { padding: 20px 20px 12px; flex: 1; }
    .mascota-info h3 { margin-bottom: 8px; font-size: 1.2rem; }
    .mascota-info p  { font-size: .9rem; margin-bottom: 4px; }
    .mascota-card .btn-eliminar { margin: 0 20px 20px; }

    @media (max-width: 900px) {
      .mascotas-layout { grid-template-columns: 1fr; }
      .form-mascota-card { position: static; }
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="page-header">
    <h1>🐾 Mis Mascotas</h1>
    <p>Gestioná tus mascotas registradas y agregá nuevas para solicitar turnos.</p>
  </div>

  <section>
    <div class="container">
      <div class="mascotas-layout">
        <!-- Formulario -->
        <div class="card form-mascota-card fade-in">
          <div class="card-body">
            <h3><i class="fa fa-plus-circle" style="color:var(--color-accent);margin-right:8px"></i>Registrar mascota</h3>
            <form id="formMascota" novalidate>
              <div class="form-group">
                <label for="nombreMascota">Nombre *</label>
                <div class="input-wrapper">
                  <i class="fa fa-tag input-icon"></i>
                  <input class="form-control" type="text" id="nombreMascota" placeholder="Ej: Firulais" required>
                </div>
              </div>
              <div class="form-group">
                <label for="tipoMascota">Tipo *</label>
                <select class="form-select" id="tipoMascota" required>
                  <option value="">Seleccionar...</option>
                  <option value="Perro">🐶 Perro</option>
                  <option value="Gato">🐱 Gato</option>
                  <option value="Otro">🐾 Otro</option>
                </select>
              </div>
              <div class="form-group">
                <label for="edadMascota">Edad (años) *</label>
                <div class="input-wrapper">
                  <i class="fa fa-birthday-cake input-icon"></i>
                  <input class="form-control" type="number" id="edadMascota" placeholder="Ej: 3" min="0" max="30" required>
                </div>
              </div>
              <div class="form-group">
                <label for="fotoMascota">Foto (opcional)</label>
                <input class="form-control" type="file" id="fotoMascota" accept="image/*">
                <img id="previewFoto" class="preview-foto" alt="Preview">
              </div>
              <button type="submit" class="btn btn-primary btn-full">
                <span class="spinner"></span>
                <span class="btn-text"><i class="fa fa-plus"></i> Agregar mascota</span>
              </button>
            </form>
            <div id="formMascotaMsg" style="margin-top:14px"></div>
          </div>
        </div>

        <!-- Lista -->
        <div>
          <h2 style="margin-bottom:28px">Mascotas registradas</h2>
          <div class="mascotas-grid" id="contenedorMascotas">
            <div class="page-loader"><div class="spinner-circle"></div></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="js/auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
